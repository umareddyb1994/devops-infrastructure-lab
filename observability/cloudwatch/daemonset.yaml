apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cloudwatch-agent
  namespace: amazon-cloudwatch

spec:
  selector:
    matchLabels:
      app: cloudwatch-agent

  template:
    metadata:
      labels:
        app: cloudwatch-agent

    spec:
      containers:
      - name: cloudwatch-agent
        image: amazon/cloudwatch-agent:latest

        resources:
          limits:
            memory: 200Mi
            cpu: 200m
